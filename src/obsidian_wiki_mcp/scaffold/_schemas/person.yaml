type: person
layer: knowledge
folder: knowledge/people

required_fields:
  - role

fields:
  role:
    type: enum
    values: [collaborator, author, contact]
  affiliation:
    type: string
    default: ""
  email:
    type: string
    default: ""
  url:
    type: string
    default: ""
  tags:
    type: list
    item_type: string
    default: []
  aliases:
    type: list
    item_type: string
    default: []
  status:
    type: enum
    values: [stub, draft, published]
    default: draft
  related_projects:
    type: list
    item_type: wikilink
    default: []
  sources_used:
    type: list
    item_type: source
    default: []
