type: decision
layer: work
folder: work/projects/{project_slug}/decisions

required_fields:
  - project
  - date
  - decision
  - rationale

fields:
  project:
    type: wikilink
  date:
    type: date
  decision:
    type: string
  alternatives:
    type: list
    item_type: string
    default: []
  rationale:
    type: string
  tags:
    type: list
    item_type: string
    default: []
  status:
    type: enum
    values: [proposed, accepted, superseded]
    default: proposed
  sources_used:
    type: list
    item_type: source
    default: []
